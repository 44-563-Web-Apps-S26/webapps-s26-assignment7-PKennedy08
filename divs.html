<!DOCTYPE html>
<html> <head> 
	<title>building lists using div</title>
	<style>
    .flex-container {
      display: flex;  flex-direction:row;
      background-color: red;
  }

.flex-container > div {  /*div children of the flex container*/
  background-color: #f1f1f1; 
  margin: 10px;  padding: 20px;  font-size: 30px;
}

/* Responsive layout */
@media (max-width: 600px) { 
	 .flex-container{
		 flex-direction:column;
		 background-color: green;
	  }
	}
</style></head>



<body>
	<h2>Parker Kennedy builds list with divs</h2>
	<input type="text" id="inputText">
		<div class="flex-container" id="target">
		  <div class="divlist">row item 1</div>   
		  <div class="divlist">row item 2</div>  
		  <div class="divlist">row item 3</div>  
		</div>
	
	<p> Press the button to create an new element of type div and then add it to the container.
		</p>
		<button onclick="addEnd()">Add end</button>
		<button onclick="addFront()">Add Front</button>
		<button onclick="removeItem()">Remove</button>
</body>
<script>
	function addEnd(){
		/* make the div and its text */
		let element = document.createElement("div")
		let value = document.getElementById("inputText").value
		element.innerHTML = value
		element.className = "divlist"		
		/* add it to the container */
		let container = document.getElementById('target')
		container.appendChild(element)
		
	}
	function addFront(){
		let element = document.createElement("div")
		let value = document.getElementById("inputText").value
		element.innerHTML = value
		element.className = "divlist"
		let container = document.getElementById("target")
		container.insertBefore(element, container.firstChild)
	}
	function removeItem(){
		let divListItems = document.getElementsByClassName("divlist")
		let length = divListItems.length
		if(length > 1 ){
			divListItems[1].remove()
		}
		else if (length == 1){
			divListItems[0].remove()
		}
	}
</script>
</html>
